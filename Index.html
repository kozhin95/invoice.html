<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot</title>
    <style>
        body { background: #111; color: white; text-align: center; padding: 50px; font-family: sans-serif; }
        .mic { background: red; border: none; width: 100px; height: 100px; border-radius: 50%; color: white; font-size: 40px; }
        #res { margin-top: 20px; border: 1px solid #444; padding: 20px; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="face" style="font-size: 80px;">🤖</div>
    <div id="res">سڵاو...</div>
    <br>
    <button class="mic" ontouchstart="start()" ontouchend="stop()">🎤</button>

    <script>
        const key = "AIzaSyDyKDpgQv7fJaS1X_8IvVRQoGC9Z6Y49Ko";
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'ku-IQ';

        function start() { try { rec.start(); document.getElementById('face').innerText="😲"; } catch(e){} }
        function stop() { rec.stop(); document.getElementById('face').innerText="🤔"; }

        rec.onresult = async (e) => {
            const txt = e.results[0][0].transcript;
            document.getElementById('res').innerText = "تۆ وتت: " + txt;
            const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({contents: [{parts: [{text: txt + " .بە کوردی زۆر کورت وەڵام بدەوە"}]}]})
            });
            const d = await r.json();
            document.getElementById('res').innerText = d.candidates[0].content.parts[0].text;
            document.getElementById('face').innerText="😊";
        };
    </script>
</body>
</html>
